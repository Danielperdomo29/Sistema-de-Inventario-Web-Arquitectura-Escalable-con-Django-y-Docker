{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Página no encontrada | Error 404</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        :root {
            --primary: {{ ui_config.primary_color|default:"#3B82F6" }};
            --primary-dark: #2563EB;
            --bg-color: #0F172A; /* Fondo oscuro premium */
            --surface: #1E293B;
            --text-light: #F8FAFC;
            --text-muted: #94A3B8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.05), transparent 25%);
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
            position: relative;
            z-index: 10;
        }

        .error-code {
            font-size: 150px;
            font-weight: 800;
            line-height: 1;
            margin: 0;
            background: linear-gradient(135deg, #F8FAFC, #94A3B8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 10px 30px rgba(0,0,0,0.5);
            letter-spacing: -5px;
            animation: float 6s ease-in-out infinite;
        }

        .error-icon {
            font-size: 60px;
            color: var(--primary);
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            margin: 10px 0 20px 0;
            color: #FFFFFF;
        }

        p {
            font-size: 16px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: var(--primary);
            color: white;
            padding: 14px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-home:hover {
            background-color: var(--primary-dark);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.6);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .glow-circle {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="glow-circle"></div>
    <div class="container">
        <div class="error-icon">
            <i class="fas fa-shield-alt"></i>
        </div>
        <div class="error-code">404</div>
        <h1>Destino Desconocido</h1>
        <p>Parece que te has salido del radar. El recurso o ruta solicitada no existe. <br>Por protocolos de seguridad, el acceso a rutas no indexadas está restringido.</p>

        <a href="/" class="btn-home">
            <i class="fas fa-arrow-left"></i> Regresar al Hub Seguro
        </a>
    </div>
</body>
</html>
